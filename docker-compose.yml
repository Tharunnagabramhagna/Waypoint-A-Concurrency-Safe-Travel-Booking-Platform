version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: travel_user
      POSTGRES_PASSWORD: travel_pass
      POSTGRES_DB: travel_booking
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U travel_user -d travel_booking']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://travel_user:travel_pass@db:5432/travel_booking
      JWT_ACCESS_SECRET: change_this_to_a_long_random_string
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: another_long_random_string_different_from_access
      JWT_REFRESH_EXPIRES_IN: 7d
      HOLD_TTL_SECONDS: 600
      CORS_ORIGIN: http://localhost:5173
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CSRF_SECRET: change_this_csrf_secret_too
      NODE_ENV: production
    ports:
      - '4000:4000'

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - '5173:5173'

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  db_data:
  redis_data:
  prometheus_data:
  grafana_data:
